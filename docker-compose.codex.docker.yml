services:
  codex-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
      target: codex-docker
      args:
        CODEX_NODE_IMAGE: ${CODEX_NODE_IMAGE:-node:24-slim@sha256:b506e7321f176aae77317f99d67a24b272c1f09f1d10f1761f2773447d8da26c}
        CODEX_VERSION: ${CODEX_VERSION:-0.121.0}
        DOCKER_CLI_IMAGE: ${DOCKER_CLI_IMAGE:-docker:27-cli}
    image: ${CODEX_DOCKER_IMAGE_NAME:-ai-sandbox-codex-agent-docker:local}
    depends_on:
      docker-daemon:
        condition: service_healthy
    environment:
      DOCKER_HOST: unix:///run/user/1000/docker.sock
    volumes:
      - codex_dind_sock:/run/user/1000

  docker-daemon-init:
    image: alpine:3.20
    container_name: ai-sandbox-codex-docker-init
    command:
      - sh
      - -lc
      - mkdir -p /run/user/1000 && chown -R 1000:1000 /run/user/1000 && chmod 700 /run/user/1000
    networks:
      - agent_net
    volumes:
      - codex_dind_sock:/run/user/1000
    restart: "no"

  docker-daemon:
    image: docker:27-dind-rootless
    container_name: ai-sandbox-codex-docker
    privileged: true
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    devices:
      - /dev/fuse
      - /dev/net/tun
    depends_on:
      proxy:
        condition: service_healthy
      docker-daemon-init:
        condition: service_completed_successfully
    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKERD_ROOTLESS_ROOTLESSKIT_NET: vpnkit
      DOCKERD_ROOTLESS_ROOTLESSKIT_PORT_DRIVER: builtin
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128
      NO_PROXY: localhost,127.0.0.1,proxy,docker-daemon
    command:
      - --host=unix:///run/user/1000/docker.sock
      - --iptables=false
    healthcheck:
      test: ["CMD-SHELL", "docker --host=unix:///run/user/1000/docker.sock info >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - agent_net
    volumes:
      - ${AI_HOME_PATH:-.}:/home/devops/project
      - codex_dind_data:/home/rootless/.local/share/docker
      - codex_dind_sock:/run/user/1000
    restart: unless-stopped

volumes:
  codex_dind_data:
    name: ai-sandbox-codex-dind-data
  codex_dind_sock:
    name: ai-sandbox-codex-dind-sock
