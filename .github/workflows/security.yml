name: Security Scan

on:
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build images
        run: |
          source .env
          docker build -f Dockerfile.agent --target claude \
            --build-arg CLAUDE_NODE_IMAGE="$CLAUDE_NODE_IMAGE" \
            --build-arg CLAUDE_CODE_VERSION="$CLAUDE_CODE_VERSION" \
            -t ai-sandbox-claude-agent:security .
          docker build -f Dockerfile.agent --target claude-docker \
            --build-arg CLAUDE_NODE_IMAGE="$CLAUDE_NODE_IMAGE" \
            --build-arg CLAUDE_CODE_VERSION="$CLAUDE_CODE_VERSION" \
            --build-arg DOCKER_CLI_IMAGE="$DOCKER_CLI_IMAGE" \
            -t ai-sandbox-claude-agent-docker:security .
          docker build -f Dockerfile.agent --target codex \
            --build-arg CODEX_NODE_IMAGE="$CODEX_NODE_IMAGE" \
            --build-arg CODEX_VERSION="$CODEX_VERSION" \
            -t ai-sandbox-codex-agent:security .
          docker build -f Dockerfile.agent --target codex-docker \
            --build-arg CODEX_NODE_IMAGE="$CODEX_NODE_IMAGE" \
            --build-arg CODEX_VERSION="$CODEX_VERSION" \
            --build-arg DOCKER_CLI_IMAGE="$DOCKER_CLI_IMAGE" \
            -t ai-sandbox-codex-agent-docker:security .
          docker build -t ai-sandbox-proxy:security ./proxy

      - name: Trivy filesystem scan
        uses: &trivy_action aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy Claude image scan
        uses: *trivy_action
        with:
          scan-type: image
          image-ref: ai-sandbox-claude-agent:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy Codex image scan
        uses: *trivy_action
        with:
          scan-type: image
          image-ref: ai-sandbox-codex-agent:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy proxy image scan
        uses: *trivy_action
        with:
          scan-type: image
          image-ref: ai-sandbox-proxy:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy Claude Docker image scan
        uses: *trivy_action
        with:
          scan-type: image
          image-ref: ai-sandbox-claude-agent-docker:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy Codex Docker image scan
        uses: *trivy_action
        with:
          scan-type: image
          image-ref: ai-sandbox-codex-agent-docker:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
