name: Security Scan

on:
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agent image
        run: docker build -t ai-agent-sandbox:security .

      - name: Build proxy image
        run: docker build -t ai-sandbox-proxy:security ./proxy

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy agent image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ai-agent-sandbox:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy proxy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ai-sandbox-proxy:security
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
