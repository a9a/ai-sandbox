name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare local secret files for tests
        run: |
          mkdir -p secrets
          printf "dummy-key-for-ci\n" > secrets/anthropic_api_key.txt
          printf "dummy-key-for-ci\n" > secrets/openai_api_key.txt
          chmod 600 secrets/anthropic_api_key.txt secrets/openai_api_key.txt

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          bash -n build.sh
          bash -n build-codex.sh
          bash -n scripts/*.sh

      - name: Shellcheck
        run: shellcheck -e SC1091 build.sh build-codex.sh scripts/*.sh

      - name: Validate compose config
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.claude.yml config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.codex.yml config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.claude.yml -f .ci/docker-compose.test.yml config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.codex.yml -f .ci/docker-compose.test.yml config >/dev/null

      - name: Build images
        run: |
          docker compose -f docker-compose.yml build proxy
          docker compose -f docker-compose.yml -f docker-compose.claude.yml build claude-agent
          docker compose -f docker-compose.yml -f docker-compose.codex.yml build codex-agent

      - name: Integration tests (Claude)
        run: ./scripts/test-integration.sh claude

      - name: Integration tests (Codex)
        run: ./scripts/test-integration.sh codex
