services:
  docker-daemon-init:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    command:
      - sh
      - -lc
      - mkdir -p /run/user/1000 && chown -R 1000:1000 /run/user/1000 && chmod 700 /run/user/1000
    networks:
      - agent_net
    volumes:
      - agent_dind_sock:/run/user/1000
    restart: "no"

  docker-daemon:
    image: ${DOCKER_DIND_IMAGE:-docker:27-dind-rootless}
    privileged: true
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    devices:
      - /dev/fuse
      - /dev/net/tun
    depends_on:
      proxy:
        condition: service_healthy
      docker-daemon-init:
        condition: service_completed_successfully
    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKERD_ROOTLESS_ROOTLESSKIT_NET: vpnkit
      DOCKERD_ROOTLESS_ROOTLESSKIT_PORT_DRIVER: builtin
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128
      NO_PROXY: localhost,127.0.0.1,proxy,docker-daemon
    command:
      - --host=unix:///run/user/1000/docker.sock
      - --iptables=false
    healthcheck:
      test: ["CMD-SHELL", "docker --host=unix:///run/user/1000/docker.sock info >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - agent_net
    volumes:
      - ${AI_HOME_PATH:-.}:/home/devops/project
      - agent_dind_data:/home/rootless/.local/share/docker
      - agent_dind_sock:/run/user/1000
    restart: unless-stopped

volumes:
  agent_dind_data:
    name: ai-sandbox-agent-dind-data
  agent_dind_sock:
    name: ai-sandbox-agent-dind-sock
