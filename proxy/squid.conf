# Listen port for HTTP proxy
http_port 3128

# Domain allowlist (one domain/suffix per line)
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# Basic hardening for proxy methods/ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
acl connect_to_ipv4 dstdom_regex -i ^([0-9]{1,3}\.){3}[0-9]{1,3}$
acl connect_to_ipv6 dstdom_regex -i ^\[?[0-9a-f:]+\]?$

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny CONNECT connect_to_ipv4
http_access deny CONNECT connect_to_ipv6

# Allow only explicitly approved destination domains
http_access allow allowed_domains
http_access deny all

# Keep logs in container stdout/stderr-friendly locations
cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

coredump_dir /var/spool/squid
