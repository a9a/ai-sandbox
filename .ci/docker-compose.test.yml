services:
  proxy:
    volumes:
      - ./.ci/allowed-domains.test.txt:/etc/squid/allowed-domains.txt:ro

  tester:
    image: curlimages/curl:8.19.0@sha256:c03110c736db81bbe1be0296f1f1608c81b954b01626bdfb0a8f84e5bd00ff3c
    command: ["sleep", "infinity"]
    depends_on:
      - proxy
      - mock-upstream
      - blocked-upstream
    networks:
      - agent_net

  mock-upstream:
    image: hashicorp/http-echo:1.0.0@sha256:fcb75f691c8b0414d670ae570240cbf95502cc18a9ba57e982ecac589760a186
    command: ["-listen=:80", "-text=ok-allowed"]
    networks:
      - agent_net

  blocked-upstream:
    image: hashicorp/http-echo:1.0.0@sha256:fcb75f691c8b0414d670ae570240cbf95502cc18a9ba57e982ecac589760a186
    command: ["-listen=:80", "-text=blocked-should-not-pass"]
    networks:
      - agent_net
