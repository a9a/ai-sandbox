services:
  proxy:
    volumes:
      - ./.ci/allowed-domains.test.txt:/etc/squid/allowed-domains.txt:ro

  tester:
    image: curlimages/curl:8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
    command: ["sleep", "infinity"]
    depends_on:
      - proxy
      - mock-upstream
      - blocked-upstream
    networks:
      - agent_net

  mock-upstream:
    image: hashicorp/http-echo:1.0.0@sha256:fcb75f691c8b0414d670ae570240cbf95502cc18a9ba57e982ecac589760a186
    command: ["-listen=:80", "-text=ok-allowed"]
    networks:
      - agent_net

  blocked-upstream:
    image: hashicorp/http-echo:1.0.0@sha256:fcb75f691c8b0414d670ae570240cbf95502cc18a9ba57e982ecac589760a186
    command: ["-listen=:80", "-text=blocked-should-not-pass"]
    networks:
      - agent_net
