services:
  claude-agent:
    build:
      target: claude-docker
      args:
        DOCKER_CLI_IMAGE: ${DOCKER_CLI_IMAGE:-docker:27-cli}
        HELM_VERSION: ${HELM_VERSION:-v3.18.4}
    image: ${CLAUDE_DOCKER_IMAGE_NAME:-ai-sandbox-claude-agent-docker:local}
    depends_on:
      docker-daemon:
        condition: service_healthy
    environment:
      DOCKER_HOST: unix:///run/user/1000/docker.sock
    volumes:
      - agent_dind_sock:/run/user/1000
