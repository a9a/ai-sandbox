services:
  codex-agent:
    extends:
      file: docker-compose.agent.yml
      service: agent
    build:
      target: codex
      args:
        CODEX_NODE_IMAGE: ${CODEX_NODE_IMAGE:-node:24-slim@sha256:b506e7321f176aae77317f99d67a24b272c1f09f1d10f1761f2773447d8da26c}
        CODEX_VERSION: ${CODEX_VERSION:-0.121.0}
    image: ${CODEX_IMAGE_NAME:-ai-sandbox-codex-agent:local}
    container_name: ai-sandbox-codex-agent
    environment:
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - source: openai_api_key
        target: openai_api_key
    volumes:
      - type: bind
        source: ${CODEX_HOME_PATH:-${PWD}/.codex}
        target: /home/devops/.codex

secrets:
  openai_api_key:
    environment: OPENAI_API_KEY
