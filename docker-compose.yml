services:
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: ai-sandbox-proxy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "3128"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - agent_net
      - egress_net
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim@sha256:f93745c153377ee2fbbdd6e24efcd03cd2e86d6ab1d8aa9916a3790c40313a55}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-0.2.9}
    image: ${IMAGE_NAME:-ai-agent-sandbox:local}
    container_name: ai-sandbox-agent
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - agent_net
    environment:
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128
      NO_PROXY: localhost,127.0.0.1,proxy
    secrets:
      - source: anthropic_api_key
        target: anthropic_api_key
    volumes:
      - ./:/home/devops/project
    stdin_open: true
    tty: true

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt

networks:
  # Internal network: agent can talk to proxy but has no direct internet egress.
  agent_net:
    internal: true
  # External network used only by the proxy for internet egress.
  egress_net: {}
