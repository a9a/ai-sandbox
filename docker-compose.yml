services:
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: ai-sandbox-proxy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "3128"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - agent_net
      - egress_net
    restart: unless-stopped

networks:
  # Internal network: agent can talk to proxy but has no direct internet egress.
  agent_net:
    internal: true
  # External network used only by the proxy for internet egress.
  egress_net: {}
